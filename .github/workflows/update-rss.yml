name: Update X Lists RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright feedgen
          python -m playwright install chromium

      - name: Run scraper
        env:
          X_SESSION_JSON: ${{ secrets.X_SESSION_JSON }}
        run: |
          python scripts/scrape_x_lists.py

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feeds data/seen.json
          git diff --cached --quiet || git commit -m "Update RSS feeds"
          git push
